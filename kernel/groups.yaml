############################################################
# YELENA KERNEL
# GROUP REGISTRY
############################################################

version: "0.1.0"

groups:

  identity:

    id: "GROUP-001"

    name: "Identity"

    version: "1.0"

    description: >
      Sistema responsável pela identidade permanente da Yelena.
      Define quem ela é, como age e como se comunica.

    enabled: true

    registered: true

    critical: true

    always_loaded: true

    priority: 1.0

    hot_reload: false

    unloadable: false

    state: "registered"

    owner: "kernel"

    category: "core"

    modules:

      - profile
      - personality
      - behavior
      - speech
      - voice
      - dialogue

    depends_on: []

    required_by:

      - cognition
      - emotions
      - memory
      - knowledge
      - social
      - support

    permissions:

      editable: true

      removable: false

      readable: true

      writable: false

    validation:

      require_manifest: true

      require_documentation: true

      allow_duplicate_modules: false

      allow_duplicate_group: false

    loading:

      boot: true

      preload: true

      cache: true

      lazy_loading: false

    metadata:

      created_by: "Kernel"

      architecture: "Modular Cognitive Architecture"

      status: "stable"

      experimental: false
