############################################################
# YELENA KERNEL
############################################################

version: "0.1.0"

name: "Yelena Kernel"

description: >
  Núcleo central responsável pela administração da arquitetura
  cognitiva da Yelena.

############################################################
# IDENTIDADE
############################################################

identity:

  codename: "YELENA"

  architecture: "Modular Cognitive Architecture"

  author: "Kauan"

  status: "development"

############################################################
# COMPONENTES
############################################################

components:

  groups:

    enabled: true

    file: "groups.yaml"

  dependencies:

    enabled: true

    file: "dependencies.yaml"

  loading:

    enabled: true

    file: "loading.yaml"

  priorities:

    enabled: true

    file: "priorities.yaml"

  states:

    enabled: true

    file: "states.yaml"

############################################################
# BOOT
############################################################

boot:

  enabled: true

  automatic: true

  validate_kernel: true

  validate_groups: true

  validate_dependencies: true

  validate_priorities: true

############################################################
# ENGINE
############################################################

engine:

  enabled: true

  controlled_by_kernel: true

  automatic_initialization: true

############################################################
# REGRAS
############################################################

rules:

  kernel_is_authority: true

  engine_cannot_modify_kernel: true

  groups_must_be_registered: true

  dependencies_are_required: true

  priorities_are_required: true

  states_are_required: true

############################################################
# SEGURANÇA
############################################################

security:

  protect_core: true

  verify_integrity: true

  prevent_duplicate_registration: true

############################################################
# FUTURO
############################################################

future:

  kernel_services: false

  distributed_kernel: false

  plugin_support: true

  automatic_registration: true

  intelligent_boot: true
