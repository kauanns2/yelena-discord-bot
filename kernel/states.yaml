############################################################
# YELENA KERNEL
# STATE MANAGEMENT
############################################################

version: "0.1.0"

############################################################
# CURRENT STATE
############################################################

current:

  system: boot

  engine: offline

  loader: idle

  activation: idle

  memory: idle

  planner: idle

  validator: idle

  prompt: idle

  response: idle

############################################################
# AVAILABLE STATES
############################################################

states:

  boot:

    description: >
      Inicialização completa do Kernel.

    next:

      - loading

  loading:

    description: >
      Carregando grupos e dependências.

    next:

      - validating

  validating:

    description: >
      Validando arquitetura e módulos.

    next:

      - ready

  ready:

    description: >
      Sistema preparado para iniciar a Engine.

    next:

      - running

  running:

    description: >
      Sistema em funcionamento.

    next:

      - idle
      - shutdown
      - maintenance

  idle:

    description: >
      Aguardando novas mensagens.

    next:

      - running

  maintenance:

    description: >
      Estado reservado para manutenção.

    next:

      - running

  shutdown:

    description: >
      Encerramento seguro do sistema.

############################################################
# TRANSITION RULES
############################################################

rules:

  allow_invalid_transition: false

  validate_before_transition: true

  save_state_before_shutdown: true

  restore_previous_state: true

############################################################
# FUTURE
############################################################

future:

  automatic_recovery: true

  emergency_mode: true

  safe_shutdown: true

  distributed_states: true
