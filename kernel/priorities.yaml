############################################################
# YELENA KERNEL
# PRIORITY CONFIGURATION
############################################################

version: "0.1.0"

############################################################
# PRIORITY SCALE
############################################################

priority_scale:

  description: >
    Quanto menor o número, maior a prioridade.

  highest: 1.0

  lowest: 9.9

############################################################
# GROUP PRIORITIES
############################################################

groups:

  identity:

    priority: 1.0

    critical: true

    description: >
      Base permanente da personalidade.

  cognition:

    priority: 1.1

    critical: true

    description: >
      Responsável pelo raciocínio.

  emotions:

    priority: 1.2

    critical: false

    description: >
      Sistema emocional.

  memory:

    priority: 1.3

    critical: false

    description: >
      Memória de curto e longo prazo.

  knowledge:

    priority: 1.4

    critical: false

    description: >
      Conhecimento geral.

  social:

    priority: 1.5

    critical: false

    description: >
      Relações e usuários.

  support:

    priority: 2.0

    critical: false

    description: >
      Sistemas auxiliares.

############################################################
# ENGINE RULES
############################################################

rules:

  use_priorities: true

  automatic_sorting: true

  allow_equal_priorities: false

  validate_priority_conflicts: true

############################################################
# FUTURE
############################################################

future:

  dynamic_priorities: true

  adaptive_priorities: true

  semantic_priority: true

  emotional_priority: true
