############################################################
# YELENA KERNEL
# LOADING CONFIGURATION
############################################################

version: "0.1.0"

loading:

  startup:

    enabled: true

    order:

      - identity
      - cognition
      - memory
      - knowledge
      - emotions
      - social
      - support

  runtime:

    lazy_loading: true

    dynamic_loading: true

    unload_unused_groups: true

    hot_reload: false

    background_loading: true

############################################################
# GROUP CONFIGURATION
############################################################

groups:

  identity:

    boot: true

    preload: true

    lazy: false

    cache: true

  cognition:

    boot: false

    preload: false

    lazy: true

    cache: true

  memory:

    boot: false

    preload: false

    lazy: true

    cache: true

  knowledge:

    boot: false

    preload: false

    lazy: true

    cache: true

  emotions:

    boot: false

    preload: false

    lazy: true

    cache: true

  social:

    boot: false

    preload: false

    lazy: true

    cache: true

  support:

    boot: false

    preload: false

    lazy: true

    cache: false

############################################################
# CACHE
############################################################

cache:

  enabled: true

  auto_clear: false

  keep_loaded_groups: true

############################################################
# VALIDATION
############################################################

validation:

  validate_before_loading: true

  verify_dependencies: true

  verify_priorities: true

############################################################
# FUTURE
############################################################

future:

  predictive_loading: true

  semantic_loading: true

  adaptive_loading: true

  intelligent_preloading: true
